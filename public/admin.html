<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FratGPT Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">
  <div id="app">
    <header>
      <div class="header-inner">
        <h1>FratGPT <span class="beta">ADMIN</span></h1>
        <a href="index.html" class="admin-link">← Back</a>
      </div>
    </header>

    <!-- Login screen -->
    <div id="login-screen">
      <div id="login-box">
        <h2>Admin Access</h2>
        <p>Enter password to view feedback data</p>
        <input id="password-input" type="password" placeholder="Password" />
        <button id="login-btn">Unlock</button>
        <p id="login-error" class="hidden error-msg">Wrong password.</p>
      </div>
    </div>

    <!-- Data screen -->
    <div id="data-screen" class="hidden">
      <div id="data-controls">
        <span id="record-count"></span>
        <div class="filter-row">
          <label>Filter:
            <select id="result-filter">
              <option value="all">All</option>
              <option value="good">Good only</option>
              <option value="bad">Bad only</option>
            </select>
          </label>
          <button id="export-btn">Export JSON</button>
        </div>
      </div>
      <div id="table-wrap">
        <table id="feedback-table">
          <thead>
            <tr>
              <th>Prompt</th>
              <th>Bot Response</th>
              <th>Result</th>
              <th>Correct Response</th>
              <th>Timestamp</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <p id="no-data" class="hidden">No feedback recorded yet.</p>
      </div>
    </div>
  </div>

  <script>
    let sessionPassword = '';
    let allData = [];

    const loginScreen = document.getElementById('login-screen');
    const dataScreen = document.getElementById('data-screen');
    const passwordInput = document.getElementById('password-input');
    const loginBtn = document.getElementById('login-btn');
    const loginError = document.getElementById('login-error');
    const tableBody = document.getElementById('table-body');
    const recordCount = document.getElementById('record-count');
    const resultFilter = document.getElementById('result-filter');
    const exportBtn = document.getElementById('export-btn');
    const noData = document.getElementById('no-data');

    async function login() {
      const pw = passwordInput.value;
      loginError.classList.add('hidden');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        if (!res.ok) { loginError.classList.remove('hidden'); return; }
        sessionPassword = pw;
        loginScreen.classList.add('hidden');
        dataScreen.classList.remove('hidden');
        loadData();
      } catch {
        loginError.classList.remove('hidden');
      }
    }

    loginBtn.addEventListener('click', login);
    passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    async function loadData() {
      const res = await fetch(`/api/admin/feedback?password=${encodeURIComponent(sessionPassword)}`);
      if (!res.ok) { loginError.classList.remove('hidden'); return; }
      allData = await res.json();
      renderTable(allData);
    }

    function renderTable(data) {
      // Sort: prompt → response → result
      const sorted = [...data].sort((a, b) => {
        if (a.prompt < b.prompt) return -1;
        if (a.prompt > b.prompt) return 1;
        if (a.response < b.response) return -1;
        if (a.response > b.response) return 1;
        if (a.result < b.result) return -1;
        if (a.result > b.result) return 1;
        return 0;
      });

      tableBody.innerHTML = '';
      if (sorted.length === 0) {
        noData.classList.remove('hidden');
        recordCount.textContent = '0 records';
        return;
      }
      noData.classList.add('hidden');
      recordCount.textContent = `${sorted.length} record${sorted.length !== 1 ? 's' : ''}`;

      for (const row of sorted) {
        const tr = document.createElement('tr');
        tr.className = row.result === 'good' ? 'row-good' : 'row-bad';
        tr.innerHTML = `
          <td>${esc(row.prompt)}</td>
          <td>${esc(row.response)}</td>
          <td class="result-cell ${row.result === 'good' ? 'good' : 'bad'}">${row.result === 'good' ? '👍 Good' : '👎 Bad'}</td>
          <td>${esc(row.correctResponse || '—')}</td>
          <td class="ts">${new Date(row.timestamp).toLocaleString()}</td>
        `;
        tableBody.appendChild(tr);
      }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    resultFilter.addEventListener('change', () => {
      const val = resultFilter.value;
      const filtered = val === 'all' ? allData : allData.filter(d => d.result === val);
      renderTable(filtered);
    });

    exportBtn.addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'fratgpt_feedback.json';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
